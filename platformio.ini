; OpenMeshOS — open-source standalone firmware for LoRa mesh devices
; Copyright 2026 Joel Claw & contributors — CC0 1.0 Universal
;
; Platform:  ESP32-S3 (T-Deck / T-Deck Plus)
; Framework: Arduino
; Display:   ST7789 320x240 IPS
; LoRa:      SX1262
; Build:     pio run -e t-deck

[env:t-deck]
platform  = espressif32
board     = esp32-s3-devkitm-1
framework = arduino

; ── Flash & partition layout ──────────────────────────────────────────
board_build.flash_size    = 16MB
board_build.flash_mode    = dio
board_build.partitions    = partitions.csv
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216

; ── CPU & PSRAM ──────────────────────────────────────────────────────
board_build.f_cpu       = 240000000L
board_build.arduino.memory_type = qio_opi
build_flags =
  -DARDUINO_ESP32S3_DEV
  -DBOARD_HAS_PSRAM=1
  -DPSRAM=opi
  -DPSRAM_MODE=octal
  -DPSRAM_SIZE=8388608
  -DCONFIG_SPIRAM_USE_MALLOC=1
  -DCONFIG_ESP32S3_SPIRAM_SUPPORT=1

; ── OpenMeshOS build flags ───────────────────────────────────────────
  -DOMS_VERSION="0.1.0-alpha.1"
  -DOMS_PLATFORM_TDECK=1
  -DOMS_SCREEN_W=320
  -DOMS_SCREEN_H=240

; ── MeshCore integration ────────────────────────────────────────────
; MeshCore lives in lib/MeshCore as a git submodule
  -DMESH_DEBUG=0
  -DRADIOLIB_GODMODE=1
  -DRADIOLIB_STATIC_ONLY=1

; ── LoRa radio (SX1262 on T-Deck) ────────────────────────────────────
  -DUSING_SX1262=1

; ── Display driver (ST7789 via SPI) ─────────────────────────────────
  -DUSER_SETUP_LOADED=1
  -DST7789_DRIVER=1
  -DOMS_TFT_WIDTH=320
  -DOMS_TFT_HEIGHT=240
  -DCGRAM_OFFSET=1

; ── GPS (T-Deck Plus has built-in GPS, OG uses external) ─────────────
;  -DOMS_HAS_BUILTIN_GPS=1

; ── Debug serial ────────────────────────────────────────────────────
  -DCORE_DEBUG_LEVEL=1
  -DBOARD_HAS_USB_SERIAL=1

; ── LVGL config ─────────────────────────────────────────────────────
  -DLV_CONF_INCLUDE_SIMPLE
  -I lib
  -I lib/MeshCore/lib/ed25519

; ── Optimisation: size matters on embedded ──────────────────────────
  -Os
  -ffunction-sections
  -fdata-sections
  -Wl,--gc-sections

; ── Pre-build script (remove Helium ARM assembly) ─────────────────────
extra_scripts = pre:pre_build.py

; ── Monitor ─────────────────────────────────────────────────────────
monitor_speed = 115200
monitor_filters = direct

; ── Lib deps (managed via PlatformIO registry) ─────────────────────
lib_deps =
  bodmer/TFT_eSPI@^2.5.34
  lvgl/lvgl@^9.2
  adafruit/Adafruit BusIO@^1.16
  adafruit/RTClib@^2.1
  jgromes/RadioLib@^7.6.0
  rweather/Crypto@^0.4.0

; ── LDF must resolve deep deps (ed25519 from MeshCore) ─────────────────
lib_ldf_mode = deep+
lib_archive = no

; ── Extra sources: ed25519 crypto (needed by MeshCore Identity) ─────────
; PlatformIO LDF can't discover this from MeshCore's nested lib, so it's copied to src/crypto/
lib_extra_dirs = lib/MeshCore/lib

lib_ignore =
  lvgl/src/draw/sw/blend/helium
  lvgl/src/draw/arm2d
  lvgl/src/draw/nema_gfx
  lvgl/src/draw/nxp
  lvgl/src/draw/renesas
  lvgl/src/draw/sdl
  lvgl/src/draw/vg_lite_tvg
  lvgl/src/draw/dma2d
  lvgl/src/draw/eve
  lvgl/src/draw/nanovg
  lvgl/src/draw/opengles
  lvgl/src/draw/espressif

; ── Lib dirs ────────────────────────────────────────────────────────
lib_dir = lib
; MeshCore submodule picked up automatically from lib/MeshCore
; ed25519 is a dependency inside MeshCore/lib that needs explicit inclusion

; ── Upload ─────────────────────────────────────────────────────────
upload_speed = 921600
upload_port  = 