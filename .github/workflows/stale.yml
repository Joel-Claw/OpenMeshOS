name: Stale Issues

on:
  schedule:
    - cron: '0 4 * * *'  # Run daily at 4 AM UTC

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          stale-issue-message: >
            This issue has been inactive for 60 days and will be closed
            in 14 days if no further activity occurs. Remove the 'stale'
            label or comment to keep it open.
          stale-pr-message: >
            This PR has been inactive for 60 days and will be closed
            in 14 days if no further activity occurs. Remove the 'stale'
            label or comment to keep it open.
          exempt-issue-labels: 'pinned,security,help-wanted'
          exempt-pr-labels: 'pinned,security'