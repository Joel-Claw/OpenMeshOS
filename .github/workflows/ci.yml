name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [t-deck]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Install dependencies
        run: pio pkg install -e ${{ matrix.environment }}

      - name: Build firmware
        run: pio run -e ${{ matrix.environment }}

      - name: Check firmware size
        run: |
          FIRMWARE=".pio/build/${{ matrix.environment }}/firmware.bin"
          if [ -f "$FIRMWARE" ]; then
            SIZE=$(wc -c < "$FIRMWARE")
            echo "Firmware size: $SIZE bytes"
            # 16MB flash = 16777216 bytes, warn if over 80%
            LIMIT=$((16777216 * 80 / 100))
            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "::warning::Firmware size ($SIZE bytes) exceeds 80% of flash"
            fi
          else
            echo "::error::Firmware binary not found"
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for TODOs in code
        run: |
          # Warn about TODO/FIXME/HACK but don't fail
          grep -rn "TODO\|FIXME\|HACK\|XXX" src/ || true

      - name: Check license headers
        run: |
          MISSING=0
          for f in $(find src/ -name '*.cpp' -o -name '*.h'); do
            if ! head -3 "$f" | grep -qi "CC0\|public domain\|Joel Claw"; then
              echo "Missing license header: $f"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "::warning::Some files are missing CC0 license headers"
          fi

      - name: Check docs exist for all screens
        run: |
          for screen in ScreenHome ScreenMap ScreenSettings ScreenTerminal; do
            if [ ! -f "docs/UI_DESIGN.md" ]; then
              echo "::error::Missing UI_DESIGN.md"
              exit 1
            fi
            if ! grep -q "$screen" docs/UI_DESIGN.md; then
              echo "::warning::$screen not documented in UI_DESIGN.md"
            fi
          done

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test tile download script
        run: |
          python3 -c "import importlib; spec = importlib.util.spec_from_file_location('download_tiles', 'scripts/download_tiles.py'); mod = importlib.util.module_from_spec(spec); spec.loader.exec_module(mod); print('Module loads OK')"
          python3 scripts/download_tiles.py --help

  map-engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run MapEngine tests
        run: |
          g++ -std=c++14 -Wall -Wextra -o test_map_engine test/test_map_engine.cpp -lm
          ./test_map_engine

      - name: Verify all tests pass
        run: |
          ./test_map_engine
          echo "MapEngine tests: $?"